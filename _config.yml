theme: jekyll-theme-chirpy

lang: es-ES
timezone: America/Lima

title: Joel Ibaceta
tagline: Personal blog
description: >-
  Blog personal de Joel Ibaceta. Código, tecnología, libros, viajes,
  fotografía y todo lo que resulte lo suficientemente interesante como
  para detenerme a escribir sobre ello.

url: "https://blog.joelibaceta.com"

github:
  username: joelibaceta

social:
  name: Joel Ibaceta
  email: mail@joelibaceta.com
  links:
    - https://github.com/joelibaceta

analytics:
  google:
    id: G-Y6VYLZ2F4R

avatar: /assets/image.png
social_preview_image: /assets/image.png

toc: true

comments:
  provider:

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: "_posts/es"
      type: posts
    values:
      lang: es-ES
      permalink: /es/:title/
  - scope:
      path: "_posts/en"
      type: posts
    values:
      lang: en
      permalink: /en/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
